name: Build iOS IPA

on:
  push:
    branches: [master]
  workflow_dispatch:
    # Allows manually triggering from GitHub Actions tab

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Setup signing assets
        env:
          BUILD_CERT_BASE64: ${{ secrets.BUILD_CERT_BASE64 }}
          BUILD_CERT_PASSWORD: ${{ secrets.BUILD_CERT_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          BUILD_PROVISION_PROFILE_EXTENSION_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_EXTENSION_BASE64 }}
        run: |
          set -e

          # Create temp keychain
          KEYCHAIN_PATH=~/build.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH

          # Import signing certificate
          echo "$BUILD_CERT_BASE64" | base64 -d > cert.p12
          security import cert.p12 -k $KEYCHAIN_PATH -P "$BUILD_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Function to install a provisioning profile
          install_profile() {
            local PROFILE_BASE64="$1"
            local PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
            mkdir -p "$PROFILE_DIR"

            local TMP_PROFILE=$(mktemp)
            echo "$PROFILE_BASE64" | base64 -d > "$TMP_PROFILE"

            # Decode profile to plist
            local PROFILE_PLIST=$(mktemp)
            if ! security cms -D -i "$TMP_PROFILE" > "$PROFILE_PLIST" 2>/dev/null; then
              echo "ERROR: Failed to decode provisioning profile (security cms -D failed)"
              echo "File type: $(file "$TMP_PROFILE")"
              echo "File size: $(wc -c < "$TMP_PROFILE") bytes"
              exit 1
            fi

            local PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$PROFILE_PLIST" 2>/dev/null)
            local PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$PROFILE_PLIST" 2>/dev/null)
            local APP_ID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$PROFILE_PLIST" 2>/dev/null)

            echo "  UUID: $PROFILE_UUID"
            echo "  Name: $PROFILE_NAME"
            echo "  AppID: $APP_ID"

            mv "$TMP_PROFILE" "$PROFILE_DIR/$PROFILE_UUID.mobileprovision"
            rm -f "$PROFILE_PLIST"

            echo "$PROFILE_NAME|$APP_ID"
          }

          echo "--- Installing main app profile ---"
          APP_INFO=$(install_profile "$BUILD_PROVISION_PROFILE_BASE64")
          echo "$APP_INFO"
          APP_PROFILE_NAME=$(echo "$APP_INFO" | head -1 | cut -d'|' -f1)
          echo "APP_PROFILE_NAME=$APP_PROFILE_NAME" >> $GITHUB_ENV

          echo "--- Installing extension profile ---"
          EXT_INFO=$(install_profile "$BUILD_PROVISION_PROFILE_EXTENSION_BASE64")
          echo "$EXT_INFO"
          EXT_PROFILE_NAME=$(echo "$EXT_INFO" | head -1 | cut -d'|' -f1)
          echo "EXT_PROFILE_NAME=$EXT_PROFILE_NAME" >> $GITHUB_ENV

          # Allow codesign to access the keychain
          security find-identity -v -p codesigning $KEYCHAIN_PATH

      - name: Build and Archive
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          xcodebuild archive \
            -project ShopPic.xcodeproj \
            -scheme ShopPic \
            -archivePath ShopPic.xcarchive \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            -configuration Release \
            DEVELOPMENT_TEAM=${DEVELOPMENT_TEAM} \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Development" \
            OTHER_CODE_SIGN_FLAGS="--keychain ~/build.keychain-db"

      - name: Create ExportOptions.plist
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          cat > ExportOptions.plist << PLEXPORT
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>teamID</key>
              <string>${DEVELOPMENT_TEAM}</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.shoppic.app</key>
                  <string>${APP_PROFILE_NAME}</string>
                  <key>com.shoppic.app.ShareExtension</key>
                  <string>${EXT_PROFILE_NAME}</string>
              </dict>
          </dict>
          </plist>
          PLEXPORT

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ShopPic.xcarchive \
            -exportPath build \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ShopPic.ipa
          path: build/*.ipa
          retention-days: 7

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain ~/build.keychain-db || true
